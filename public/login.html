<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | Vexar Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0b0e; }
        .glass { background: rgba(20, 25, 35, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .gradient-text { background: linear-gradient(135deg, #5865F2, #00ff88); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #5865F2, #4752C4); }
        .btn-primary:hover { background: linear-gradient(135deg, #4752C4, #3a44a8); }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex items-center justify-center p-6">

<div class="max-w-md w-full">
    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-3 mb-4">
            <i class="fas fa-cube text-4xl text-[#5865F2]"></i>
            <span class="text-3xl font-bold gradient-text">VEXAR PROJECT</span>
        </div>
        <p class="text-gray-400">Admin Paneline Giriş Yap</p>
    </div>
    
    <!-- Giriş Formu -->
    <div class="glass rounded-2xl p-8">
        <form id="loginForm">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Kullanıcı Adı veya E-posta</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" id="username" class="w-full glass pl-10 pr-4 py-3 rounded-lg focus:outline-none focus:border-[#5865F2]" placeholder="admin" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Şifre</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="password" id="password" class="w-full glass pl-10 pr-4 py-3 rounded-lg focus:outline-none focus:border-[#5865F2]" placeholder="••••••••" required>
                    </div>
                </div>
            </div>
            
            <div id="errorMessage" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg text-red-400 text-sm"></div>
            
            <button type="submit" class="btn-primary w-full py-3 rounded-lg mt-6 font-medium">
                <i class="fas fa-sign-in-alt mr-2"></i>Giriş Yap
            </button>
        </form>
        
        <p class="text-center text-gray-400 text-sm mt-6">
            Hesabınız yok mu? 
            <a href="/register" class="text-[#5865F2] hover:underline">Kayıt Ol</a>
        </p>
        
        <div class="mt-4 p-3 bg-[#5865F2]/10 border border-[#5865F2]/30 rounded-lg">
            <p class="text-xs text-gray-400 text-center">
                <i class="fas fa-info-circle mr-1"></i>
                Demo: <span class="text-[#5865F2]">admin</span> / <span class="text-[#5865F2]">123</span>
            </p>
        </div>
    </div>
    
    <!-- Geri Dön -->
    <div class="text-center mt-6">
        <a href="/" class="text-gray-400 hover:text-white text-sm">
            <i class="fas fa-arrow-left mr-1"></i>Ana Sayfaya Dön
        </a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('errorMessage');
    
    errorEl.classList.add('hidden');
    
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (res.ok) {
            // Token'ı kaydet
            localStorage.setItem('token', data.token);
            
            // Şifre değişimi gerekiyor mu?
            if (data.forcePasswordChange) {
                location.href = '/change-password';
            } else {
                // Admin paneline yönlendir
                location.href = '/admin';
            }
        } else {
            errorEl.textContent = data.error || 'Giriş başarısız!';
            errorEl.classList.remove('hidden');
        }
    } catch (error) {
        errorEl.textContent = 'Sunucu hatası, lütfen tekrar deneyin!';
        errorEl.classList.remove('hidden');
    }
});

// Zaten giriş yapılmış mı kontrol et
const token = localStorage.getItem('token');
if (token) {
    fetch('/api/auth/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
    })
    .then(res => res.json())
    .then(data => {
        if (data.valid) {
            location.href = '/admin';
        }
    })
    .catch(() => {});
}
</script>

</body>
</html>
