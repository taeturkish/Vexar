<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Değiştir | Vexar Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0b0e; }
        .glass { background: rgba(20, 25, 35, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .gradient-text { background: linear-gradient(135deg, #5865F2, #00ff88); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #5865F2, #4752C4); }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex items-center justify-center p-6">

<div class="max-w-md w-full">
    <div class="text-center mb-8">
        <i class="fas fa-lock text-4xl text-[#5865F2] mb-4"></i>
        <h2 class="text-2xl font-bold gradient-text">Şifre Değiştir</h2>
        <p class="text-gray-400 mt-2">İlk girişinizde şifrenizi değiştirmelisiniz</p>
    </div>
    
    <div class="glass rounded-2xl p-8">
        <form id="changePasswordForm">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Mevcut Şifre</label>
                    <input type="password" id="currentPassword" class="w-full glass px-4 py-3 rounded-lg" value="123" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Yeni Şifre</label>
                    <input type="password" id="newPassword" class="w-full glass px-4 py-3 rounded-lg" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Yeni Şifre Tekrar</label>
                    <input type="password" id="confirmPassword" class="w-full glass px-4 py-3 rounded-lg" required>
                </div>
            </div>
            
            <div id="errorMessage" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg text-red-400 text-sm"></div>
            
            <button type="submit" class="btn-primary w-full py-3 rounded-lg mt-6 font-medium">
                <i class="fas fa-save mr-2"></i>Şifreyi Güncelle
            </button>
        </form>
    </div>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) location.href = '/login';

document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const currentPassword = document.getElementById('currentPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const errorEl = document.getElementById('errorMessage');
    
    if (newPassword !== confirmPassword) {
        errorEl.textContent = 'Yeni şifreler eşleşmiyor!';
        errorEl.classList.remove('hidden');
        return;
    }
    
    if (newPassword.length < 6) {
        errorEl.textContent = 'Yeni şifre en az 6 karakter olmalıdır!';
        errorEl.classList.remove('hidden');
        return;
    }
    
    try {
        const res = await fetch('/api/auth/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, currentPassword, newPassword })
        });
        
        const data = await res.json();
        
        if (res.ok) {
            alert('Şifre başarıyla değiştirildi!');
            location.href = '/admin';
        } else {
            errorEl.textContent = data.error || 'Şifre değiştirilemedi!';
            errorEl.classList.remove('hidden');
        }
    } catch (error) {
        errorEl.textContent = 'Sunucu hatası!';
        errorEl.classList.remove('hidden');
    }
});
</script>

</body>
</html>
