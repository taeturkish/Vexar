<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vexar Hosting | Kayıt Ol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0b0b0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      position: relative;
      overflow-x: hidden;
    }
    
    /* Glow Effects */
    .glow {
      position: fixed;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 {
      top: -300px;
      right: -200px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, transparent 70%);
      animation: float 8s ease-in-out infinite;
    }
    .glow-2 {
      bottom: -300px;
      left: -200px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
      animation: float 8s ease-in-out infinite reverse;
    }
    .glow-3 {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
      width: 1000px;
      height: 1000px;
      animation: pulse 6s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
    }
    
    /* Container */
    .register-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 520px;
      padding: 24px;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Card */
    .register-card {
      background: rgba(18, 18, 24, 0.85);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 40px;
      padding: 48px 44px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(168, 85, 247, 0.1) inset;
      transition: all 0.4s;
    }
    
    .register-card:hover {
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(168, 85, 247, 0.2) inset;
      border-color: rgba(168, 85, 247, 0.2);
    }
    
    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 44px;
    }
    
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      box-shadow: 0 15px 35px rgba(168, 85, 247, 0.4);
      animation: iconPulse 3s ease-in-out infinite;
    }
    
    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 15px 35px rgba(168, 85, 247, 0.4); }
      50% { box-shadow: 0 20px 45px rgba(168, 85, 247, 0.7); }
    }
    
    .logo-text {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 0%, #c084fc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    /* Title */
    .register-title {
      font-size: 36px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }
    
    .register-subtitle {
      color: #8b8b9a;
      text-align: center;
      font-size: 16px;
      margin-bottom: 40px;
      font-weight: 400;
    }
    
    /* Form */
    .form-group {
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }
    .form-group:nth-child(4) { animation-delay: 0.4s; }
    
    .form-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #c5c5d2;
      font-size: 14px;
      letter-spacing: 0.3px;
    }
    
    .input-wrapper {
      position: relative;
    }
    
    .input-wrapper i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #6b6b7e;
      font-size: 18px;
      transition: color 0.3s;
    }
    
    .input-wrapper input {
      width: 100%;
      padding: 18px 18px 18px 52px;
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      color: white;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s;
    }
    
    .input-wrapper input:focus {
      outline: none;
      border-color: #a855f7;
      background: rgba(168, 85, 247, 0.05);
      box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.1);
    }
    
    .input-wrapper input:focus + i,
    .input-wrapper input:valid + i {
      color: #a855f7;
    }
    
    .input-wrapper input::placeholder {
      color: #4a4a5e;
      font-weight: 400;
    }
    
    /* Button */
    .btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      border: none;
      border-radius: 18px;
      color: white;
      font-weight: 700;
      font-size: 17px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      font-family: 'Montserrat', sans-serif;
      position: relative;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(168, 85, 247, 0.3);
      margin-top: 32px;
      opacity: 0;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 45px rgba(168, 85, 247, 0.5);
    }
    
    .btn:hover::before {
      width: 400px;
      height: 400px;
    }
    
    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      z-index: 2;
    }
    
    .spinner {
      width: 22px;
      height: 22px;
      border: 2.5px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Messages */
    .message {
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
      display: none;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.08);
      border-left: 4px solid #ef4444;
      color: #fca5a5;
    }
    
    .success-message {
      background: rgba(34, 197, 94, 0.08);
      border-left: 4px solid #22c55e;
      color: #86efac;
    }
    
    /* Footer */
    .login-link {
      text-align: center;
      margin-top: 32px;
      color: #8b8b9a;
      font-size: 15px;
      opacity: 0;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
    }
    
    .login-link a {
      color: #a855f7;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.3s;
      margin-left: 6px;
      position: relative;
    }
    
    .login-link a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #a855f7, #3b82f6);
      transition: width 0.3s;
    }
    
    .login-link a:hover {
      color: #c084fc;
    }
    
    .login-link a:hover::after {
      width: 100%;
    }
    
    /* Back Button */
    .back-home {
      position: fixed;
      top: 32px;
      left: 32px;
      color: #8b8b9a;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s;
      z-index: 20;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 40px;
      backdrop-filter: blur(10px);
    }
    
    .back-home:hover {
      color: white;
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(168, 85, 247, 0.3);
      transform: translateX(-5px);
    }
    
    .back-home i {
      font-size: 16px;
      transition: transform 0.3s;
    }
    
    .back-home:hover i {
      transform: translateX(-3px);
    }
    
    /* Responsive */
    @media (max-width: 600px) {
      .register-container {
        padding: 16px;
      }
      .register-card {
        padding: 36px 28px;
        border-radius: 32px;
      }
      .back-home {
        top: 20px;
        left: 20px;
        padding: 10px 16px;
        font-size: 14px;
      }
      .logo-text {
        font-size: 32px;
      }
      .register-title {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>
  
  <a href="/" class="back-home">
    <i class="fas fa-arrow-left"></i>
    <span>Ana Sayfa</span>
  </a>
  
  <div class="register-container">
    <div class="register-card">
      <div class="logo">
        <div class="logo-icon">V</div>
        <span class="logo-text">VEXAR</span>
      </div>
      
      <h1 class="register-title">Kayıt Ol</h1>
      <p class="register-subtitle">Yeni bir hesap oluştur ve başla</p>
      
      <div id="errorMessage" class="message error-message"></div>
      <div id="successMessage" class="message success-message"></div>
      
      <form id="registerForm" onsubmit="window.handleRegister(event)">
        <div class="form-group">
          <label>Kullanıcı Adı</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="kullaniciadi" required minlength="3" autocomplete="off">
          </div>
        </div>
        
        <div class="form-group">
          <label>E-posta Adresi</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="ornek@email.com" required autocomplete="off">
          </div>
        </div>
        
        <div class="form-group">
          <label>Şifre</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" required minlength="6">
          </div>
        </div>
        
        <div class="form-group">
          <label>Şifre Tekrar</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="confirmPassword" placeholder="••••••••" required>
          </div>
        </div>
        
        <button type="submit" class="btn" id="registerBtn">
          <div class="btn-content" id="btnContent">
            <i class="fas fa-user-plus"></i>
            <span>Kayıt Ol</span>
          </div>
        </button>
      </form>
      
      <p class="login-link">
        Zaten hesabın var mı?
        <a href="/giris">Giriş Yap <i class="fas fa-arrow-right" style="margin-left: 6px; font-size: 12px;"></i></a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      const SUPABASE_URL = 'https://mwqfxhoakrjyuhyarhlw.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13cWZ4aG9ha3JmeXVoeWFyaGx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYxNjIsImV4cCI6MjA5MjM3MjE2Mn0.qwX8s3AaIViMzef3suuil6KKJPkPz35HYIeZBrYyAkI';
      
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      async function handleRegister(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const btn = document.getElementById('registerBtn');
        const btnContent = document.getElementById('btnContent');
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        
        if (password !== confirmPassword) {
          errorDiv.textContent = 'Şifreler eşleşmiyor!';
          errorDiv.style.display = 'block';
          return;
        }
        
        if (password.length < 6) {
          errorDiv.textContent = 'Şifre en az 6 karakter olmalıdır!';
          errorDiv.style.display = 'block';
          return;
        }
        
        btnContent.innerHTML = '<span class="spinner"></span><span>Kaydediliyor...</span>';
        btn.disabled = true;
        
        try {
          const { data: authData, error: authError } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
              data: { username: username }
            }
          });
          
          if (authError) {
            if (authError.message.includes('already registered')) {
              throw new Error('Bu e-posta adresi zaten kayıtlı!');
            }
            throw authError;
          }
          
          if (authData.user) {
            const { error: profileError } = await supabase
              .from('profiles')
              .insert([{
                id: authData.user.id,
                username: username,
                email: email,
                role: 'user'
              }]);
            
            if (profileError) {
              console.error('Profil hatası:', profileError);
            }
          }
          
          successDiv.textContent = '✅ Hesabınız başarıyla oluşturuldu! Giriş sayfasına yönlendiriliyorsunuz...';
          successDiv.style.display = 'block';
          
          btnContent.innerHTML = '<i class="fas fa-check"></i><span>Başarılı!</span>';
          
          setTimeout(() => {
            window.location.href = '/giris';
          }, 2000);
          
        } catch (error) {
          errorDiv.textContent = error.message;
          errorDiv.style.display = 'block';
          btnContent.innerHTML = '<i class="fas fa-user-plus"></i><span>Kayıt Ol</span>';
          btn.disabled = false;
        }
      }
      
      async function checkAuth() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          window.location.href = '/panel';
        }
      }
      
      window.handleRegister = handleRegister;
      checkAuth();
    })();
  </script>
</body>
</html>
