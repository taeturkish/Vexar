<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vexar Hosting | Giriş Yap</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 { top: -200px; right: -200px; }
    .glow-2 { bottom: -200px; left: -200px; background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%); }
    
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }
    .login-card {
      background: rgba(20, 20, 30, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 32px;
      padding: 48px 40px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
      animation: fadeInUp 0.6s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
    }
    .logo-text {
      font-size: 34px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .login-title {
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-subtitle {
      color: #9ca3af;
      text-align: center;
      font-size: 15px;
      margin-bottom: 36px;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 500;
      color: #d1d5db;
      font-size: 14px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #6b7280;
      font-size: 16px;
    }
    .input-wrapper input {
      width: 100%;
      padding: 16px 16px 16px 48px;
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      color: white;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      transition: all 0.3s;
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: #a855f7;
      background: rgba(168, 85, 247, 0.05);
    }
    .input-wrapper input::placeholder {
      color: #4b5563;
    }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      border: none;
      border-radius: 16px;
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Montserrat', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(168, 85, 247, 0.4);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-message {
      color: #ef4444;
      font-size: 13px;
      margin-top: 8px;
      min-height: 20px;
    }
    .register-link {
      text-align: center;
      margin-top: 28px;
      color: #9ca3af;
      font-size: 14px;
    }
    .register-link a {
      color: #a855f7;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .register-link a:hover {
      color: #c084fc;
    }
    .back-home {
      position: absolute;
      top: 30px;
      left: 30px;
      color: #9ca3af;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      transition: color 0.2s;
      z-index: 20;
    }
    .back-home:hover {
      color: white;
    }
    .forgot-password {
      text-align: right;
      margin-top: -12px;
      margin-bottom: 20px;
    }
    .forgot-password a {
      color: #9ca3af;
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot-password a:hover {
      color: #a855f7;
    }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  
  <a href="/" class="back-home">
    <i class="fas fa-arrow-left"></i> Ana Sayfa
  </a>
  
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">V</div>
        <span class="logo-text">VEXAR</span>
      </div>
      
      <h1 class="login-title">Giriş Yap</h1>
      <p class="login-subtitle">Hesabına giriş yap ve devam et!</p>
      
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>E-posta</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="ornek@email.com" required>
          </div>
        </div>
        
        <div class="form-group">
          <label>Şifre</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
        </div>
        
        <div class="forgot-password">
          <a href="#"><i class="fas fa-question-circle"></i> Şifremi Unuttum</a>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <button type="submit" class="btn" id="loginBtn">
          <span id="btnText">Giriş Yap</span>
          <span id="btnSpinner" class="spinner" style="display: none;"></span>
        </button>
      </form>
      
      <p class="register-link">
        Hesabın yok mu? <a href="/kayit">Kayıt Ol</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase yapılandırması
    const SUPABASE_URL = 'https://mwqfxhoakrjyuhyarhlw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13cWZ4aG9ha3JmeXVoeWFyaGx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYxNjIsImV4cCI6MjA5MjM3MjE2Mn0.qwX8s3AaIViMzef3suuil6KKJPkPz35HYIeZBrYyAkI';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      const errorDiv = document.getElementById('errorMessage');
      const btnText = document.getElementById('btnText');
      const btnSpinner = document.getElementById('btnSpinner');
      
      errorDiv.textContent = '';
      
      btnText.style.display = 'none';
      btnSpinner.style.display = 'inline-block';
      document.getElementById('loginBtn').disabled = true;
      
      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });
        
        if (error) {
          if (error.message.includes('Invalid login credentials')) {
            throw new Error('E-posta veya şifre hatalı!');
          }
          throw error;
        }
        
        // Kullanıcı rolünü kontrol et
        const { data: profile } = await supabase
          .from('profiles')
          .select('role')
          .eq('id', data.user.id)
          .single();
        
        // Başarılı giriş - panele yönlendir
        window.location.href = '/panel';
        
      } catch (error) {
        errorDiv.textContent = 'Hata: ' + error.message;
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
        document.getElementById('loginBtn').disabled = false;
      }
    }
    
    // Zaten giriş yapmış mı kontrol et
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = '/panel';
      }
    }
    
    checkAuth();
  </script>
</body>
</html>
