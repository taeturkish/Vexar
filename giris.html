<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vexar Hosting | Giriş Yap</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0b0b0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .glow {
      position: fixed;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 { top: -300px; right: -200px; background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, transparent 70%); }
    .glow-2 { bottom: -300px; left: -200px; background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%); }
    
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      padding: 24px;
    }
    .login-card {
      background: rgba(18, 18, 24, 0.9);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 40px;
      padding: 48px 44px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
    }
    .logo-text {
      font-size: 38px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .login-title {
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-subtitle {
      color: #8b8b9a;
      text-align: center;
      font-size: 15px;
      margin-bottom: 36px;
    }
    .form-group { margin-bottom: 24px; }
    .form-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #c5c5d2;
      font-size: 14px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #6b6b7e;
      font-size: 18px;
    }
    .input-wrapper input {
      width: 100%;
      padding: 18px 18px 18px 52px;
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      color: white;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: #a855f7;
      background: rgba(168, 85, 247, 0.05);
    }
    .btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      border: none;
      border-radius: 18px;
      color: white;
      font-weight: 700;
      font-size: 17px;
      cursor: pointer;
      margin-top: 32px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(168, 85, 247, 0.4);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error-message {
      color: #ef4444;
      font-size: 14px;
      margin-top: 12px;
      text-align: center;
    }
    .register-link {
      text-align: center;
      margin-top: 28px;
      color: #8b8b9a;
      font-size: 15px;
    }
    .register-link a {
      color: #a855f7;
      text-decoration: none;
      font-weight: 700;
    }
    .back-home {
      position: fixed;
      top: 32px;
      left: 32px;
      color: #8b8b9a;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 40px;
      backdrop-filter: blur(10px);
      z-index: 20;
    }
    .back-home:hover { color: white; background: rgba(255, 255, 255, 0.08); }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  
  <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> Ana Sayfa</a>
  
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">V</div>
        <span class="logo-text">VEXAR</span>
      </div>
      
      <h1 class="login-title">Giriş Yap</h1>
      <p class="login-subtitle">Hesabına giriş yap</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label>E-posta</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="ornek@email.com" required>
          </div>
        </div>
        
        <div class="form-group">
          <label>Şifre</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
        </div>
        
        <div id="message" class="error-message"></div>
        
        <button type="submit" class="btn" id="loginBtn">
          <span id="btnText">Giriş Yap</span>
          <span id="btnSpinner" class="spinner" style="display:none;"></span>
        </button>
      </form>
      
      <p class="register-link">Hesabın yok mu? <a href="/kayit">Kayıt Ol</a></p>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
    const SUPABASE_URL = 'https://mwqfxhoakrjyuhyarhlw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13cWZ4aG9ha3JmeXVoeWFyaGx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYxNjIsImV4cCI6MjA5MjM3MjE2Mn0.qwX8s3AaIViMzef3suuil6KKJPkPz35HYIeZBrYyAkI';
    
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Admin hesabı oluştur (ilk çalıştırmada)
    async function createAdminIfNotExists() {
      const { data: existing } = await supabase
        .from('profiles')
        .select('username')
        .eq('username', 'Admin')
        .single();
      
      if (!existing) {
        // Admin kullanıcısını oluştur
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email: 'admin@vexar.host',
          password: 'Amik123456',
        });
        
        if (!authError && authData.user) {
          await supabase.from('profiles').insert([{
            id: authData.user.id,
            username: 'Admin',
            email: 'admin@vexar.host',
            role: 'admin'
          }]);
        }
      }
    }
    
    createAdminIfNotExists();
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('message');
      const btnText = document.getElementById('btnText');
      const btnSpinner = document.getElementById('btnSpinner');
      const loginBtn = document.getElementById('loginBtn');
      
      msg.textContent = '';
      btnText.style.display = 'none';
      btnSpinner.style.display = 'inline-block';
      loginBtn.disabled = true;
      
      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });
        
        if (error) {
          if (error.message.includes('Invalid login')) {
            throw new Error('E-posta veya şifre hatalı!');
          }
          throw error;
        }
        
        // Kullanıcı profilini al
        const { data: profile } = await supabase
          .from('profiles')
          .select('*')
          .eq('id', data.user.id)
          .single();
        
        // Kullanıcıyı localStorage'a kaydet (UI için)
        localStorage.setItem('vexarCurrentUser', JSON.stringify(profile));
        
        // Panele yönlendir
        window.location.href = '/panel';
        
      } catch (error) {
        msg.textContent = error.message;
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
        loginBtn.disabled = false;
      }
    });
    
    // Zaten giriş yapmış mı?
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = '/panel';
    }
  </script>
</body>
</html>
